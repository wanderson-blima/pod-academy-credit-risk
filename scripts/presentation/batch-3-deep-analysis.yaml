  ## SLIDE 13 — OVERFITTING ANALYSIS

  **Layout**: Grafico de barras horizontal (GAP por modelo) + zona de rejeicao.

  **Titulo do slide**: "Analise de Overfitting — GAP Train vs OOT" (36pt Bold)
  **Subtitulo**: "GAP = (KS_train - KS_oot) / KS_train × 100" (14pt, #4A4A6A)

  **Grafico Principal (70% do slide)**:
  Barras horizontais mostrando o GAP de cada modelo, ordenado de menor a maior:

  | Modelo | KS Train | KS OOT | GAP |
  |--------|----------|--------|-----|
  | LR L1 v2 | 0.3514 | 0.3314 | 5.7% |
  | CatBoost | 0.3742 | 0.3482 | 7.0% |
  | Random Forest | 0.3715 | 0.3370 | 9.3% |
  | **Champion (Top-3 Avg)** | **0.3944** | **0.3501** | **11.2%** |
  | LightGBM v2 | 0.3972 | 0.3494 | 12.0% |
  | XGBoost | 0.4086 | 0.3494 | 14.5% |
  | ~~Stacking~~ | ~~0.4568~~ | ~~0.3129~~ | ~~31.6%~~ |

  Formatacao das barras:
  - GAP < 10%: Verde (#00FF88) — "Excelente generalizacao"
  - GAP 10-15%: Cyan (#00F0FF) — "Aceitavel"
  - GAP 15-25%: Amarelo (#FFD600) — "Atencao"
  - GAP > 25%: Vermelho (#FF3366) — "Rejeitado"

  Linha vertical tracejada em GAP=15% com label "Threshold recomendado"
  Barra do Stacking: cor vermelha, riscada, com tag "REJECTED — overfitting severo"

  **Card de insight (embaixo)**:
  - "LR L1 tem menor GAP (5.7%) mas menor KS. Champion (11.2%) equilibra performance e generalizacao."
  - "Stacking rejeitado: GAP 31.6% indica que o meta-learner decorou o treino."

  **Footnote**: "Fonte: training_results_20260311_015100.json + ensemble_results.json | GAP = degradacao relativa de KS"

