    title: "Title Slide"
    data_sources: []
  - number: 2
    title: "Executive Summary KPIs"
    data_sources:
      - "scoring_summary.json: total_records=3900378"
      - "ensemble_results.json: ks_oot=0.35005, auc_oot=0.73677, gini_oot=47.35"
      - "business-value-analysis.md: R$22.6M economia bruta (cutoff 700), liq. -R$34M, <R$170/mes"
  - number: 3
    title: "Impacto Financeiro"
    data_sources:
