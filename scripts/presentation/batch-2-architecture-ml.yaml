prompt: |
  Crie 5 slides de apresentacao executiva (16:9, 1920x1080) para o Hackathon PoD Academy (Claro + Oracle).
  Estes sao os slides 6 a 10 de 18. Mantenha consistencia visual com os slides anteriores.

  ## DESIGN SYSTEM (siga rigorosamente)

  **Fundo**: Branco puro (#FFFFFF). SEM fundos escuros.
  **Cards**: Fundo #F8F9FA, border-radius 12px, borda 1px cyan rgba(0,240,255,0.3), shadow sutil, padding 24px.
  **Cards KPI Hero**: Fundo branco, borda 2px #00F0FF, glow 0 0 20px rgba(0,240,255,0.3), padding 32px.
  **Cores de acento**: Cyan #00F0FF (primario), Green #00FF88 (positivo), Yellow #FFD600 (alerta), Red #FF3366 (critico).
  **Texto**: Titulos #1A1A2E (36-42pt Bold), Corpo #4A4A6A (16-18pt), Labels #8A8AAA (12-14pt uppercase).
  **Numeros Hero**: 64-80pt ExtraBold #1A1A2E.
  **Tipografia**: Inter ou Montserrat.
  **Decoracao**: Linhas finas de circuito impresso nos cantos (cyan 30% opacity), grid de pontos sutil no fundo.
  **Header**: Barra com logo Claro (esquerda) + Oracle (direita), borda inferior cyan.
  **Footer**: "Hackathon PoD Academy — Marco 2026" (esquerda) + "Slide N/18" (direita), 10pt #8A8AAA.
  **Tabelas**: Header #1A1A2E fundo com texto branco, linhas alternadas branco/#F8F9FA, borda cyan sutil.
  **Margens**: 80px em todos os lados.

  ---

  ## SLIDE 6 — ARCHITECTURE OVERVIEW

  **Layout**: Diagrama de pipeline horizontal (Medallion) com metricas em cada estagio.

  **Titulo do slide**: "Arquitetura End-to-End na OCI" (36pt Bold)

  **Pipeline Medallion (horizontal, da esquerda para direita)**:
  Representar como 4 blocos conectados por setas, cada bloco e um card:

  Bloco 1 — BRONZE (borda #CD7F32 bronze):
  - Icone: database
  - "Bronze Layer"
  - "22 min"
  - "19 tabelas"
  - "163M rows"
  - Tecnologia: "Object Storage + Delta Lake"

  Seta → (linha cyan animada, #00F0FF)

  Bloco 2 — SILVER (borda #C0C0C0 prata):
  - Icone: filter
  - "Silver Layer"
  - "25.5 min"
  - "19 tabelas"
  - "275K dupes removidos"
  - Tecnologia: "Type casting + Dedup + MERGE"

  Seta →

  Bloco 3 — GOLD (borda #FFD600 dourado):
  - Icone: star
  - "Gold Layer"
  - "4h 58min"
  - "3 books + consolidado"
  - "3.9M × 402 cols"
  - Tecnologia: "Feature Store"

  Seta →

  Bloco 4 — ML (borda #00FF88 verde):
  - Icone: brain/AI
  - "ML Pipeline"
  - "58 min"
  - "12 tasks (Airflow)"
  - "5 modelos + 3 ensembles"
  - Tecnologia: "scikit-learn + LightGBM + XGBoost + CatBoost"

  **Barra inferior**: Timeline total "Pipeline completo: ~6h 43min (dados brutos → score de credito)"

  **Icones OCI (embaixo do pipeline)**: Object Storage, Data Science, ADW, Airflow — logos pequenos alinhados.

  **Footnote**: "Fonte: Pipeline executado em VM E3.Flex (4 OCPUs / 64 GB) | Regiao sa-saopaulo-1"

  ---

  ## SLIDE 7 — COST ARCHITECTURE

  **Layout**: Tabela de custos (esquerda, 55%) + card ROI (direita, 45%).

  **Titulo do slide**: "Custo vs Retorno — Infrastructure as Value" (36pt Bold)

  **Tabela de Custos (lado esquerdo)**:
  Header: "Cenarios de Custo Mensal (OCI)"

  | Cenario | Descricao | Custo/Mes |
  |---------|-----------|-----------|
  | Parado | Recursos inativos (storage only) | R$ 33 |
  | 1 Execucao | Pipeline completo mensal | R$ 121 |
  | Desenvolvimento | Desenvolvimento ativo diario | R$ 248 |
  | Producao | Execucao diaria automatizada | R$ 908 |

  Detalhamento:
  | Recurso | Custo |
  |---------|-------|
  | VM Orchestrator (E3.Flex 4 OCPU / 64 GB) | ~R$ 120/mes |
  | Object Storage (4 buckets, ~10 GB) | ~R$ 5/mes |
  | ADW | Always Free (R$ 0) |
  | Data Catalog | Always Free (R$ 0) |
  | Networking (VCN + Subnet) | ~R$ 43/mes |
  | **Total** | **~R$ 168/mes** |

  **Card ROI (lado direito)** — Card hero com glow verde:
  - Label: "RETORNO SOBRE INVESTIMENTO"
  - Hero Number: "< R$ 170/mes" (72pt ExtraBold, #00FF88)
  - Comparativo visual:
    - Barra vermelha pequena: "Custo anual: R$ 2.016"
    - Barra verde: "Perdas brutas evitadas (cutoff 700): R$ 22.6M"
    - Barra laranja: "Receita perdida (rejeicao bons): R$ 56.9M"
  - Texto: "Economia liquida depende do cutoff: +R$1.7M (300) | ~0 (400) | -R$34M (700)"
  - Badge: "Decisao de negocio: cutoff define trade-off"

  **Footnote**: "Fonte: Precos OCI sa-saopaulo-1 (marco 2026) | ADW e Data Catalog Always Free"

