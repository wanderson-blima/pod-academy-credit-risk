  ## SLIDE 8 — FEATURE FUNNEL

  **Layout**: Funil visual (esquerda, 55%) + composicao por book (direita, 45%).

  **Titulo do slide**: "Selecao de Features — Funil 5 Estagios" (36pt Bold)

  **Funil (lado esquerdo)**:
  Visualizacao em formato de funil, cada estagio mais estreito:

  Estagio 0 — Entrada:
  - "402 features (consolidado)" — barra mais larga, cinza claro
  - Nota: "Excluidas 45 non-numeric → 357 candidatas"

  Estagio 1 — Information Value (IV > 0.02):
  - "357 → 185" — barra cyan
  - Label: "-48.3%"

  Estagio 2 — L1 Regularization (coefs != 0):
  - "185 → 162" — barra cyan medio
  - Label: "-12.4%"

  Estagio 3 — Correlation Filter (|r| < 0.95):
  - "162 → 114" — barra cyan escuro
  - Label: "-29.6%"

  Estagio 4 — PSI Stability (PSI < 0.25):
  - "114 → 110" — barra verde
  - Label: "-3.5%"

  Estagio 5 — Anti-leakage:
  - "110 → 110" — barra verde intensa
  - Label: "0 removidas"

  Resultado final: "110 FEATURES SELECIONADAS" (badge verde com glow)

  **Composicao por Book (lado direito)**:
  3 cards empilhados mostrando a composicao das 110 features:

  Card FAT (Faturamento):
  - "41 features" (28pt Bold, #00F0FF)
  - "37.3% do total"
  - Barra proporcional cyan

  Card REC (Recarga):
  - "34 features" (28pt Bold, #00FF88)
  - "30.9% do total"
  - Barra proporcional verde

  Card PAG (Pagamento):
  - "25 features" (28pt Bold, #FFD600)
  - "22.7% do total"
  - Barra proporcional amarela

  Card Outros (CADASTRO + TELCO + TARGET + vars):
  - "10 features" (28pt Bold, #8A8AAA)
  - "9.1% do total"
  - Barra proporcional cinza

  **Footnote**: "Fonte: funnel_summary.json | Feature counts: FAT=41, REC=34, PAG=25, outros=10"

  ---

  ## SLIDE 9 — MODEL COMPARISON

  **Layout**: Tabela comparativa (topo, 55%) + champion highlight (embaixo, 45%).

  **Titulo do slide**: "Comparativo de Modelos — Champion Selection" (36pt Bold)

  **Tabela de Modelos (area principal)**:
  Tabela com 8 linhas (5 modelos + 3 ensembles), destaque na linha champion:

  | Modelo | KS OOT | AUC OOT | Gini OOT | PSI | GAP* | Status |
  |--------|--------|---------|----------|-----|------|--------|
  | LR L1 v2 | 0.3314 | 0.7231 | 44.62% | 0.001361 | 5.7% | PASS |
  | LightGBM v2 | 0.3494 | 0.7365 | 47.29% | 0.000933 | 12.0% | PASS |
  | XGBoost | 0.3494 | 0.7362 | 47.24% | 0.000817 | 14.5% | PASS |
  | CatBoost | 0.3482 | 0.7354 | 47.08% | 0.000563 | 7.0% | PASS |
  | Random Forest | 0.3370 | 0.7278 | 45.56% | 0.001209 | 9.3% | PASS |
  | **Top-3 Average** | **0.3501** | **0.7368** | **47.35%** | **0.000754** | **11.2%** | **CHAMPION** |
  | Blend (SLSQP) | 0.3501 | 0.7368 | 47.35% | 0.000754 | 11.2% | = Average |
  | ~~Stacking~~ | ~~0.3129~~ | ~~0.7072~~ | ~~41.44%~~ | ~~0.001379~~ | ~~31.6%~~ | ~~REJECTED~~ |

  *GAP = (KS_train - KS_oot) / KS_train × 100 — mede overfitting

  Formatacao da tabela:
  - Linha Champion: fundo rgba(0, 255, 136, 0.1), borda esquerda 3px #00FF88
  - Linha Stacking: texto riscado, fundo rgba(255, 51, 102, 0.05), tag "REJECTED" em vermelho
  - Header: fundo #1A1A2E, texto branco
  - Alternancia de cores nas linhas

  **Card Champion (embaixo da tabela)**:
  - "CHAMPION: Top-3 Average (LightGBM + XGBoost + CatBoost)" (24pt Bold)
  - 3 mini KPIs inline: KS=0.3501 | AUC=0.7368 | Gini=47.35%
  - Badge: "QG-05 PASSED" (verde)
  - Nota: "Blend (SLSQP) otimizador convergiu para pesos iguais (1/3 cada) = identico ao Average"

  **Footnote**: "Fonte: training_results_20260311_015100.json + ensemble_results.json | OOT: SAFRAs 202502-202503"

  ---

  ## SLIDE 10 — MONITORING

  **Layout**: Score PSI timeline (topo) + Feature drift summary (centro) + Agreement (embaixo).

  **Titulo do slide**: "Monitoring — Estabilidade do Modelo" (36pt Bold)

  **Secao 1 — Score PSI por SAFRA (topo, 40% do slide)**:
  Grafico de barras horizontais ou mini-cards em linha:

  | SAFRA | PSI | Status |
  |-------|-----|--------|
  | 202410 | 0.0038 | GREEN |
  | 202411 | 0.0005 | GREEN |
  | 202412 | 0.0002 | GREEN |
  | 202501 | 0.0021 | GREEN |
  | 202502 | 0.0010 | GREEN |
  | 202503 | 0.0040 | GREEN |

  Cada barra/card com cor verde (#00FF88), badge "GREEN".
  Titulo da secao: "Score PSI — Todas as SAFRAs GREEN" (com checkmark verde)
  Threshold line: PSI < 0.10 = GREEN, 0.10-0.25 = YELLOW, > 0.25 = RED

  **Secao 2 — Feature Drift (centro, 35% do slide)**:
  Card resumo:
  - "13 features YELLOW" (cor #FFD600) — "PSI entre 0.10 e 0.18"
  - "0 features RED" (cor #00FF88) — "Nenhuma feature com PSI > 0.25"
  - "97 features GREEN" — estavel
  - Overall Status: "WARNING" (badge amarelo) — "Monitorar features com drift moderado"
  - Top 3 features com drift: FAT_QTD_FATURAS (0.181), FAT_INDICE_CONCENTRACAO_FAT (0.161), PAG_VLR_ALOCACAO_PYM (0.162)

  **Secao 3 — Model Agreement (embaixo, 25% do slide)**:
  3 mini-cards inline:
  - "LGBM vs XGB": "90.6%" (verde)
  - "LGBM vs CB": "90.7%" (verde)
  - "XGB vs CB": "92.2%" (verde)
  Titulo: "Agreement entre modelos base > 90%"

  **Footnote**: "Fonte: monitoring_report.json | Status geral: WARNING (features com drift moderado, scores estaveis)"

