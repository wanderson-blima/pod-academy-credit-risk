# AIOS Sync Configuration
# Maps squads to Claude Code commands and other IDE configurations
# Used by: *command squad {name} (squad-creator-sync-ide-command task)

active_ides:
  - claude # .claude/commands/

# Mapeamento de diretorio → prefixo de comando
pack_aliases:
  oci-data-platform: oci-data-platform
  credit-risk-ds: credit-risk-ds
  squad-creator: squad-creator
  squad-design: squad-design

# Mapeamentos de sincronizacao
sync_mappings:
  squad_agents:
    source: 'squads/*/agents/'
    destinations:
      claude:
        - path: '.claude/commands/{pack}/'
          format: 'md'

# Registro de squads sincronizados
synced_squads:
  - name: credit-risk-ds
    synced_at: '2026-02-10T00:00:00.000Z'
    components: [credit-risk-chief, feature-engineer, model-trainer, model-evaluator, deploy-engineer, model-monitor, pipeline]
  - name: squad-creator
    synced_at: '2026-02-10T00:00:00.000Z'
    components: [squad-chief, squad, oalanicolas, pedro-valerio]
  - name: oci-data-platform
    synced_at: '2026-02-15T00:00:00.000Z'
    components: [oci-chief, infra-architect, data-engineer, ml-engineer, cloud-ops, security-engineer, pipeline]

behavior:
  log_sync_operations: true
  auto_validate: true
