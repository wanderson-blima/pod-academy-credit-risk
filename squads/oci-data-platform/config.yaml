name: oci-data-platform
version: 2.1.0
short-title: OCI Data Platform
description: >-
  Squad especialista em Oracle Cloud Infrastructure (OCI) para migração e operação
  de plataformas de dados com arquitetura medalhão (Bronze/Silver/Gold).
  Cobre infraestrutura como código (Terraform), ingestão batch, processamento PySpark
  via OCI Data Flow, treinamento de modelos ML via OCI Data Science, e gestão de custos.
  Projetada para migrar o pipeline de risco de crédito do Microsoft Fabric para OCI.
  QUALITY mode upgrade: 9 elite minds cloned, ~150 veto conditions (v2), full Voice+Thinking DNA.
author: PoD Academy Team
license: MIT
icon: '☁️'
slashPrefix: oci
quality_mode: QUALITY
quality_score: 95.0
quality_grade: A+
upgrade_date: 2026-02-15

model_routing:
  philosophy: "All Opus — maximum quality for first OCI execution. No Sonnet, no Haiku."
  allowed_models: [opus]
  rationale: >-
    First-time execution on OCI requires deep reasoning for error handling,
    OCI-specific quirks, and cascading failure prevention. Haiku optimization
    deferred until tasks are empirically validated in production.
  orchestrator:
    model: opus
  task_execution:
    default_model: opus
    reason: "First execution — zero margin for error. Haiku deferred to post-validation."
    determinism_analysis:
      date: 2026-02-15
      total_actions: 153
      deterministic_actions: 143
      determinism_pct: 93.5
      note: "93.5% deterministic but untested on OCI — Opus handles unexpected errors"
  tasks:
    setup-oci-cli.md: { model: opus, determinism: 75 }
    deploy-network.md: { model: opus, determinism: 100 }
    deploy-storage.md: { model: opus, determinism: 100 }
    deploy-database.md: { model: opus, determinism: 100 }
    deploy-dataflow.md: { model: opus, determinism: 100 }
    deploy-datascience.md: { model: opus, determinism: 100 }
    ingest-bronze.md: { model: opus, determinism: 100 }
    transform-silver.md: { model: opus, determinism: 100 }
    engineer-gold.md: { model: opus, determinism: 100 }
    train-model.md: { model: opus, determinism: 100 }
    deploy-model.md: { model: opus, determinism: 90 }
    manage-costs.md: { model: opus, determinism: 100 }
    destroy-infra.md: { model: opus, determinism: 80 }
  hybrid_optimization:
    date: 2026-02-15
    phase: "complete"
    scripts_extracted: 20
    scripts_loc: 850
    gap_zero_enforced: 13
    classification:
      SCRIPT_ONLY: 11
      HYBRID: 2
    directory: scripts/
  future_optimization:
    trigger: "After first successful OCI execution"
    plan: "Downgrade 10 SHOULD_BE_WORKER tasks to Haiku (93.5% det → safe)"
    potential_savings: "$340/year (79.7% reduction)"

settings:
  activation:
    show_ecosystem_report: true
    show_greeting: true
    show_quick_commands: true
  ecosystem_report:
    show_totals: true
    show_top_squads: false
    show_quality_refs: true
    show_gaps: false

project:
  platform: Oracle Cloud Infrastructure (OCI)
  language: Python 3.x / PySpark 3.5
  iac_tool: Terraform (OCI Provider >= 6.0)
  compute: OCI Data Flow (Managed Spark)
  storage: OCI Object Storage (Standard/Infrequent/Archive)
  database: Autonomous Data Warehouse (ADW) Serverless
  ml_platform: OCI Data Science (JupyterLab + Jobs + Pipelines)
  secrets: OCI Vault
  governance: OCI Data Catalog
  orchestration: OCI Functions + Events
  region: sa-saopaulo-1
  source_project: Microsoft Fabric (credit-risk-ds)
  target: FPD (First Payment Default) — Credit Risk Scoring
  granularity: NUM_CPF + SAFRA
  records: 3.9M
  features: 402 → 110 (feature selection)
  safras: [202410, 202411, 202412, 202501, 202502, 202503]

agents:
  orchestrator:
    id: oci-chief
    tier: orchestrator
    file: agents/oci-chief.md
    covers: [routing, coordination, migration-planning, status-tracking]
  tier_0:
    - id: infra-architect
      tier: 0
      file: agents/infra-architect.md
      covers: [terraform, networking, landing-zone, iac-modules, architecture-design]
  tier_1:
    - id: data-engineer
      tier: 1
      file: agents/data-engineer.md
      covers: [data-flow, object-storage, medallion-architecture, pyspark-etl, data-catalog]
    - id: ml-engineer
      tier: 1
      file: agents/ml-engineer.md
      covers: [data-science, model-training, model-deployment, ads-sdk, feature-store]
    - id: cloud-ops
      tier: 1
      file: agents/cloud-ops.md
      covers: [oci-cli, credentials, start-stop, budgets, monitoring, scaling]
  tier_2:
    - id: security-engineer
      tier: 2
      file: agents/security-engineer.md
      covers: [iam-policies, vault-secrets, network-security, compliance, encryption]

tasks:
  # Infrastructure
  - setup-oci-cli.md
  - deploy-network.md
  - deploy-storage.md
  - deploy-database.md
  - deploy-dataflow.md
  - deploy-datascience.md
  # Data Pipeline
  - ingest-bronze.md
  - transform-silver.md
  - engineer-gold.md
  # ML Lifecycle
  - train-model.md
  - deploy-model.md
  # Operations
  - manage-costs.md
  - destroy-infra.md

workflows:
  - wf-full-deploy.yaml
  - wf-data-pipeline.yaml
  - wf-model-lifecycle.yaml
  - wf-cost-management.yaml

quality_gates:
  - id: QG-OCI-001
    name: Infrastructure Quality Gate
    transition: "Terraform Plan → Terraform Apply"
    type: blocking
    criteria: >-
      Plan sem erros, todas resources criadas, VCN + subnets + gateways validados,
      security lists revisadas, budgets configurados, tags aplicadas
    checklist: checklists/infra-quality-gate.md

  - id: QG-OCI-002
    name: Data Pipeline Quality Gate
    transition: "Bronze → Silver → Gold"
    type: blocking
    criteria: >-
      Contagem de registros consistente entre camadas, tipos corretos no Silver,
      deduplicação aplicada, particionamento por SAFRA validado,
      Data Catalog atualizado com schemas
    checklist: checklists/data-quality-gate.md

  - id: QG-OCI-003
    name: Model Quality Gate
    transition: "Training → Deployment"
    type: blocking
    criteria: >-
      KS > 20, Gini > 30, AUC > 0.65, métricas OOS estáveis,
      modelo registrado no Model Catalog, artefatos completos,
      endpoint de scoring testado
    checklist: checklists/model-quality-gate.md

  - id: QG-OCI-004
    name: Security & Compliance Gate
    transition: "Development → Production"
    type: blocking
    criteria: >-
      IAM policies least-privilege, Vault secrets (sem hardcoded),
      subnets privadas para dados, encryption at rest, VCN flow logs habilitados,
      budget alerts configurados
    checklist: checklists/security-checklist.md

tools:
  mcp_servers:
    - name: terraform-mcp-server
      url: https://github.com/hashicorp/terraform-mcp-server
