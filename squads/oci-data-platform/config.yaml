      agent: infra-architect
      priority: HIGH
    - name: mcp-server-oci
      url: https://github.com/jopsis/mcp-server-oci
      purpose: 85 tools for OCI resource management across 11+ service categories
      agent: infra-architect
      priority: HIGH
    - name: oracle-sqlcl-mcp
      url: https://github.com/oracle/mcp
      purpose: Native MCP access to Oracle Database via SQLcl
      agent: data-engineer
      priority: HIGH
  cli_tools:
    - name: steampipe
      url: https://hub.steampipe.io/plugins/turbot/oci
      purpose: SQL-based querying of OCI resources for compliance and inventory
      agent: security-engineer
      priority: HIGH
    - name: powerpipe
      url: https://hub.powerpipe.io/mods/turbot/steampipe-mod-oci-compliance
      purpose: CIS OCI Foundations Benchmark v3.0 automated compliance dashboards
      agent: security-engineer
      priority: HIGH
    - name: checkov
      url: https://www.checkov.io/
      purpose: Static analysis for Terraform IaC misconfigurations
      agent: infra-architect
      priority: MEDIUM
  python_libraries:
    - name: evidently
      url: https://github.com/evidentlyai/evidently
      purpose: ML/data drift monitoring with 100+ metrics
      agent: ml-engineer
      priority: HIGH
    - name: shap
      url: https://github.com/shap/shap
